<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Notice Board</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:30px;
}
.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}
textarea{
    width:100%;
    height:100px;
    padding:10px;
    font-size:16px;
}
button{
    margin-top:15px;
    padding:10px 20px;
    background:#003b8f;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
<h2>Notice Board Admin</h2>

<textarea id="notice" placeholder="Ek notice har line me likho..."></textarea>

<br>
<button onclick="saveNotice()">Save Notice</button>

</div>

<script>
const box=document.getElementById("notice");

box.value=localStorage.getItem("collegeNotice") || "";

function saveNotice(){
localStorage.setItem("collegeNotice",box.value);
alert("Notice Saved Successfully");
}
</script>

</body>
</html>
